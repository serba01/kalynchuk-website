<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Инициализация Forminit
        const forminit = new Forminit();
        const FORM_ID = "fzjy82sp7u6";

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-upload');
        const fileList = document.getElementById('file-list');
        const auditForm = document.getElementById('audit-form');
        const submitBtn = document.getElementById('submit-btn');

        // Контейнер для файлов
        let dataTransfer = new DataTransfer();

        function updateUI() {
            fileList.innerHTML = '';
            const files = dataTransfer.files;
            if (files.length > 0) {
                Array.from(files).forEach(file => {
                    fileList.innerHTML += `<div class="text-green-500 font-mono text-[10px] uppercase tracking-widest italic">[READY] &bull; ${file.name}</div>`;
                });
                fileList.classList.remove('hidden');
            } else {
                fileList.classList.add('hidden');
            }
        }

        // Drag & Drop события
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
            dropzone.addEventListener(name, (e) => { e.preventDefault(); e.stopPropagation(); });
        });

        ['dragenter', 'dragover'].forEach(name => {
            dropzone.addEventListener(name, () => dropzone.classList.add('drag-over'));
        });

        ['dragleave', 'drop'].forEach(name => {
            dropzone.addEventListener(name, () => dropzone.classList.remove('drag-over'));
        });

        dropzone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            // Очищаем старое и добавляем новое (чтобы всегда было ровно то, что перетянули)
            dataTransfer = new DataTransfer();
            Array.from(files).forEach(file => dataTransfer.items.add(file));
            fileInput.files = dataTransfer.files;
            updateUI();
        });

        fileInput.addEventListener('change', (e) => {
            dataTransfer = new DataTransfer();
            Array.from(e.target.files).forEach(file => dataTransfer.items.add(file));
            updateUI();
        });

        // Отправка
        auditForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            if (dataTransfer.files.length < 2) {
                alert("PROTOCOL ERROR: 2 specific datasets are required (Products and Search Terms). Please drag them together.");
                return;
            }

            submitBtn.innerHTML = "UPLOADING DATA PACKET...";
            submitBtn.disabled = true;

            // Собираем данные
            const formData = new FormData(auditForm);
            
            try {
                const { data, error } = await forminit.submit(FORM_ID, formData);
                
                if (error) throw new Error(error.message);

                submitBtn.innerHTML = "DATA SECURED. CHECK EMAIL WITHIN 24H.";
                submitBtn.classList.replace("bg-white", "bg-green-600");
                submitBtn.classList.replace("text-black", "text-white");
                
                auditForm.reset();
                dataTransfer = new DataTransfer();
                fileInput.files = dataTransfer.files;
                fileList.classList.add('hidden');

            } catch (err) {
                alert("System Error: " + err.message);
                submitBtn.innerHTML = "GENERATE TEASER REPORT";
                submitBtn.disabled = false;
            }
        });
    });
</script>
